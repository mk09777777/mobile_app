buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

gradle.projectsEvaluated {
    rootProject.subprojects { proj ->
        def sourcesJar = proj.tasks.findByName("releaseSourcesJar")
        def codegen = proj.tasks.findByName("generateCodegenArtifactsFromSchema")
        if (sourcesJar != null && codegen != null) {
            sourcesJar.dependsOn(codegen)
        }
    }
}
